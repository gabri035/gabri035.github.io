<!doctype html>
<html lang="it">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Callz Pricing</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
        <link href="../css/style.css" rel="stylesheet"/>

    </head>

    <body>
        <!-- Navbar -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        
        

        
        lass="p-3 border rounded text-bg-light">
                        <div class="mb-3">
                            <label class="form-label">Prezzo Attuale del sottostante</label>
                            <input type="number" step="any" id="S" class="form-control" placeholder="es. 100">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Strike Price (K)</label>
                            <input type="number" step="any" id="K" class="form-control" placeholder="es. 105">
                        </div>
                
                        <div class="mb-3">
                            <label class="form-label">Prezzo dell'Opzione</label>
                            <input type="number" step="any" id="X" class="form-control" placeholder="es. 2.5">
                        </div>
                
                        <button id="calculateBtn" class="btn btn-primary">Genera Grafico</button>
                        
                        <hr>
                
                        <div id="imageContainer" class="mt-3"></div>


                        <script>
                            document.getElementById('calculateBtn').onclick = function(){
                                const formData = new FormData();
                                formData.append('S', document.getElementById('S').value);
                                formData.append('K', document.getElementById('K').value);
                                formData.append('X', document.getElementById('X').value);
                            
                                fetch('/generate_payoff', {
                                    method: 'POST',
                                    body: formData
                                })
                                .then(response => response.json())
                                .then(data => {
                                    document.getElementById('imageContainer').innerHTML = `<img src="${data.image_url}?${new Date().getTime()}" class="img-fluid rounded shadow-sm">`;
                                })
                                .catch(error => console.error('Errore:', error));
                            };
                        </script>
                            

                    </div>
                </div> 
            </div>
        </div>
    </body>
</html>
